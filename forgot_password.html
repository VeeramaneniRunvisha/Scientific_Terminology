<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Concept Clarity</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Language Selector -->
    <div class="language-selector-auth">
        <select id="languageSelector" class="language-selector" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
        </select>
    </div>

    <div class="auth-container">
        <h2 data-i18n="forgotPassword">Forgot Password?</h2>
        <p data-i18n="forgotPasswordSubtitle">Enter your email to reset your password.</p>

        <label class="input-label" data-i18n="email">Email</label>
        <input type="email" id="forgotEmail" data-i18n="emailPlaceholder" placeholder="Enter your email">

        <button onclick="handleForgotPassword()" data-i18n="submit">Submit</button>

        <p class="link-text">
            <span data-i18n="rememberedPassword">Remembered your password?</span>
            <a href="login.html" data-i18n="login">Login</a>
        </p>

        <div id="forgotMsg"></div>
    </div>

    <script src="translations.js?v=2"></script>
    <script src="auth.js?v=2"></script>
    <script>
        // Update subtitle translation if missing
        if (!translations.en.forgotPasswordSubtitle) {
            translations.en.forgotPasswordSubtitle = "Enter your email to reset your password.";
            translations.hi.forgotPasswordSubtitle = "अपना पासवर्ड रीसेट करने के लिए अपना ईमेल दर्ज करें।";
        }
        if (!translations.en.rememberedPassword) {
            translations.en.rememberedPassword = "Remembered your password?";
            translations.hi.rememberedPassword = "अपना पासवर्ड याद है?";
        }
        updatePageLanguage();
    </script>

</body>

</html>
