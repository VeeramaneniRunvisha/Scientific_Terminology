<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Concept Clarity</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-container">
        <h2 data-i18n="resetPassword">Reset Password</h2>
        <p data-i18n="resetPasswordSubtitle">Enter your new password.</p>

        <!-- Use a hidden field for email, passed via URL -->
        <input type="hidden" id="resetEmail">

        <label class="input-label" data-i18n="newPassword">New Password</label>
        <div class="password-wrapper">
            <input type="password" id="newPassword" data-i18n="enterPassword" placeholder="Enter new password">
            <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
        </div>

        <div id="resetPasswordFeedback" class="strength-meter"></div>
        <label class="input-label" data-i18n="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" data-i18n="confirmPasswordPlaceholder"
                placeholder="Confirm new password">
            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
        </div>

        <button onclick="handleResetPassword()" data-i18n="updatePassword">Update Password</button>

        <div id="resetMsg"></div>
    </div>

    <script src="translations.js"></script>
    <script src="auth.js"></script>
    <script>
        // Check for email in URL
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            if (email) {
                document.getElementById('resetEmail').value = email;
            } else {
                // Redirect if no email
                window.location.href = 'login.html';
            }

            // Add missing translations
            if (!translations.en.resetPassword) {
                translations.en.resetPassword = "Reset Password";
                translations.hi.resetPassword = "पासवर्ड रीसेट करें";
            }
            if (!translations.en.resetPasswordSubtitle) {
                translations.en.resetPasswordSubtitle = "Enter your new password.";
                translations.hi.resetPasswordSubtitle = "अपना नया पासवर्ड दर्ज करें।";
            }
            updatePageLanguage();
        };
    </script>

</body>

</html>
